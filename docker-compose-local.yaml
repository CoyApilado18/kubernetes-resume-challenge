services:
  db:
    image: docker.io/library/mysql:5.7
    container_name: ecommerce-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ecomdb
      MYSQL_USER: ecomuser
      MYSQL_PASSWORD: ecompassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: 
      context: .
      dockerfile: Dockerfile.php-mysqli # because our PHP code uses mysqli_connect(), we need this Dockerfile (see Dockerfile.php-mysqli)
    container_name: ecommerce-web
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      DB_HOST: host.containers.internal
      DB_NAME: ecomdb
      DB_USER: ecomuser
      DB_PASSWORD: ecompassword
    volumes:
      - ./:/var/www/html:Z

volumes:
  mysql_data:
