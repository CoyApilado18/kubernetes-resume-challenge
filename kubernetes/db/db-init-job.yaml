apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: dev
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: db-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: db-init
        image: mysql:8.0
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          echo "Waiting for database..."
          until mysqladmin ping -h"${DB_HOST}" -u"${DB_USER}" -p"${DB_PASSWORD}" --silent; do
            sleep 2
          done

          echo "Running db-load-script.sql..."
          mysql -h"${DB_HOST}" \
                -u"${DB_USER}" \
                -p"${DB_PASSWORD}" \
                "${DB_NAME}" < /scripts/db-load-script.sql
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        volumeMounts:
        - name: db-init-script
          mountPath: /scripts/db-load-script.sql
          subPath: db-load-script.sql
          readOnly: true
      volumes:
      - name: db-init-script
        configMap:
          name: db-init-script
          items:
          - key: db-load-script.sql
            path: db-load-script.sql
