name: CI/CD - Build and Deploy

on:
  workflow_dispatch:
  #push:
  #  branches:
  #     - main
        
env:
  IMAGE_NAME: ghcr.io/CoyApilado18/ecom-web #* testyoc/ecom-web:v8
  HELM_RELEASE: ecom-web
  HELM_CHART_PATH: ./helm

jobs:
  build-and-deploy: # job id
    runs-on: k8s

    steps:
      - name: Chekout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_PAT }}
        #  username: ${{ secrets.DOCKER_USERNAME }}
        #  password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5 #https://github.com/docker/build-push-action
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Helm upgrade release
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --set image.repository= ghcr.io/CoyApilado18/ecom-web \
            --set image.tag=${{ github.sha }} \
            --namespace k8s-lab --create-namespace
