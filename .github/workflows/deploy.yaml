name: CI/CD - Build and Deploy

on:
  workflow_dispatch:
  #push:
  #  branches:
  #     - main
        
env:
  IMAGE_NAME: ghcr.io/coyapilado18/ecom-web #* testyoc/ecom-web:v8
  HELM_RELEASE: ecom-web
  HELM_CHART_PATH: ./helm/ecom-app

jobs:
  build-and-deploy: # job id
    runs-on: k8s

    steps:
      - name: Chekout code
        uses: actions/checkout@v4
      
      - name: Login to GHCR
        run: |
          printf "%s" "${GHCR_PAT}" | podman login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - name: Build and push image with Podman
        run: |
          podman build -t "${IMAGE_NAME}:${GITHUB_SHA}" .
          podman push "${IMAGE_NAME}:${GITHUB_SHA}"
      #- name: Set up Docker Buildx
       # uses: docker/setup-buildx-action@v3
      
      #- name: Login to Dockerhub
       # uses: docker/login-action@v3
       # with:
        #  registry: ghcr.io
        #  username: #${ github.actor }}
        #  password: #${ secrets.GHCR_PAT }}
        #  username: #{{ secrets.DOCKER_USERNAME }}
        #  password: #{{ secrets.DOCKER_PASSWORD }}
      
      #- name: Build and push Docker image
       # uses: docker/build-push-action@v5 #https://github.com/docker/build-push-action
       # with:
        #  context: .
        #  file: ./Dockerfile
        #  push: true
        #  tags: #${ env.IMAGE_NAME }}:${ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Helm upgrade release
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --set image.repository= ${{ env.IMAGE_NAME }}\
            --set image.tag= ${{ github.sha }} \
            --namespace default --create-namespace
